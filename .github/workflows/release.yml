name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Build & Test (gate the release)
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build --if-present

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=verbose

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          flags: release
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Publish to npm
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # Create GitHub Release with changelog
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-test, publish]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF#refs/tags/}" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md

          # Group commits by type
          echo "### Features" >> changelog.md
          git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --grep="^feat" >> changelog.md || true
          echo "" >> changelog.md

          echo "### Bug Fixes" >> changelog.md
          git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --grep="^fix" >> changelog.md || true
          echo "" >> changelog.md

          echo "### Tests" >> changelog.md
          git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --grep="^test" >> changelog.md || true
          echo "" >> changelog.md

          echo "### Other Changes" >> changelog.md
          git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --grep="^chore\|^ci\|^docs\|^refactor" >> changelog.md || true
          echo "" >> changelog.md

          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...v${{ steps.version.outputs.VERSION }}" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.VERSION }}
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
